[project]
name = "rosetta-instructions"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "rosetta-schemas",
    "rosetta-utils",
    "rosetta-pcode",
    "rosetta-generate-sla",
    "rosetta-opcode-map",
    "langgraph",
    "docquery @ git+https://github.com/gsbhub/docquery",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/rosetta_instructions"]

[tool.uv.sources]
rosetta-schemas = { workspace = true }
rosetta-utils = { workspace = true }
rosetta-pcode = { workspace = true }
rosetta-generate-sla = { workspace = true }
rosetta-opcode-map = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
