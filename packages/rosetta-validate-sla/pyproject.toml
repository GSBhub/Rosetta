[project]
name = "rosetta-validate-sla"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "rosetta-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rosetta_validate_sla"]

[tool.uv.sources]
rosetta-schemas = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
