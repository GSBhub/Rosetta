[project]
name = "rosetta-generate-sla"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "rosetta-schemas",
    "jinja2>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rosetta_generate_sla"]
artifacts = ["src/rosetta_generate_sla/sla/templates/**"]

[tool.uv.sources]
rosetta-schemas = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
