# ARM multi-variant evaluation manifest for rosetta batch
# Paths support $ENV_VAR expansion.
# PDFs live in dbs/; DBs are created by 'rosetta ingest'.
# Run: rosetta batch --manifest manifests/arm.yaml --out ./output

targets:
  # -----------------------------------------------------------------------
  # ARMv4 / ARMv4T (ARM7TDMI era) — no manual on disk, skipped
  # -----------------------------------------------------------------------
  # - id: armv4
  #   name: ARM_v4_generated
  #   manual: dbs/armv4_ref.pdf
  #   db: dbs/armv4.db
  #   ghidra_reference_lang: ARM:LE:32:v4
  #   reference_slaspec: $GHIDRA_HOME/Ghidra/Processors/ARM/data/languages/ARM4_le.slaspec

  # -----------------------------------------------------------------------
  # ARMv5 / ARMv5T (ARM9 era) — no manual on disk, skipped
  # -----------------------------------------------------------------------
  # - id: armv5
  #   name: ARM_v5_generated
  #   manual: dbs/armv5_ref.pdf
  #   db: dbs/armv5.db
  #   ghidra_reference_lang: ARM:LE:32:v5
  #   reference_slaspec: $GHIDRA_HOME/Ghidra/Processors/ARM/data/languages/ARM5_le.slaspec

  # -----------------------------------------------------------------------
  # ARMv6 (ARM11 era)
  # Manual: ARM Architecture Reference Manual (DDI 0100I)
  # -----------------------------------------------------------------------
  - id: armv6
    name: ARM_v6_generated
    manual: manuals/armv6_ref.pdf
    db: dbs/armv6.db
    ghidra_reference_lang: ARM:LE:32:v6
    reference_slaspec: $GHIDRA_HOME/Ghidra/Processors/ARM/data/languages/ARM6_le.slaspec

  # -----------------------------------------------------------------------
  # ARMv7 (Cortex-A/R/M era) — primary smoke-test target
  # Manual: ARM Architecture Reference Manual (DDI 0406C)
  # -----------------------------------------------------------------------
  - id: armv7
    name: ARM_v7_generated
    manual: manuals/armv7_ref.pdf
    db: dbs/armv7.db
    ghidra_reference_lang: ARM:LE:32:v7
    reference_slaspec: $GHIDRA_HOME/Ghidra/Processors/ARM/data/languages/ARM7_le.slaspec

  # -----------------------------------------------------------------------
  # ARMv8 32-bit (AArch32)
  # Manual: ARM Architecture Reference Manual (DDI 0487)
  # -----------------------------------------------------------------------
  - id: armv8_32
    name: ARM_v8_generated
    manual: manuals/armv8_ref.pdf
    db: dbs/armv8.db
    ghidra_reference_lang: ARM:LE:32:v8
    reference_slaspec: $GHIDRA_HOME/Ghidra/Processors/ARM/data/languages/ARM8_le.slaspec

  # -----------------------------------------------------------------------
  # AArch64 (ARMv8-A 64-bit)
  # Manual: ARM Architecture Reference Manual (DDI 0487) — same doc as v8-32
  # -----------------------------------------------------------------------
  - id: aarch64
    name: AARCH64_v8A_generated
    manual: manuals/armv8_ref.pdf
    db: dbs/aarch64.db
    ghidra_reference_lang: AARCH64:LE:64:v8A
    reference_slaspec: $GHIDRA_HOME/Ghidra/Processors/AARCH64/data/languages/AARCH64.slaspec
